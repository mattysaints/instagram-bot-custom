##############################################################################
# Config HASHTAG GROWTH - @marramattia_fmgpro
# ---------------------------------------------------------------------------
# Obiettivo: massimizzare follower GROWTH targetizzato puntando sugli hashtag
# di nicchia (bodybuilding / palestra / coaching IT).
#
# Perche' hashtag invece di blogger-followers:
#   - blogger-followers contengono molti fake/inattivi (vedi le tante
#     "Reconciling local state" -> account morti/blocchi).
#   - hashtag-likers-recent prende utenti ATTIVI (hanno appena messo like a
#     un post nelle ultime ore) -> tasso di follow-back 30-45%
#     (vs 15-20% blogger-followers).
#   - hashtag-posts-recent prende AUTORI di post recenti -> ottimo per
#     commento AI contestuale (Gemini vede caption e adatta).
#
# Strategia funnel 60/40:
#   60% hashtag-likers-recent (volume + bacino attivo)
#   40% hashtag-posts-recent  (qualita' + commento AI)
#
# Target giornaliero (5 micro-sessioni, fasce generate da run-dynamic.py):
#   follow:   5 x 10 = ~50/g    (tabella prudente: 60-70, sto sotto soglia)
#   like:     5 x 22 = ~110/g   (tabella: 120-150, margine ban-safety)
#   comment:  5 x  6 = ~30/g    (tabella: 150-200 max, AI -> qualita' top)
#   DM: 0
#
# Rate orario garantito (sessioni ~90 min):
#   follow:  ~7/h   (max prudente: 8-10/h)
#   like:    ~14/h  (max prudente: 15-20/h)
#   comment: ~4/h   (max prudente: 10-15/h)
##############################################################################

# ---------------------------------------------------------------------------
# General Configuration
# ---------------------------------------------------------------------------
username: marramattia_fmgpro
device: emulator-5554
app-id: com.instagram.android
use-cloned-app: false
allow-untested-ig-version: true
screen-sleep: true
screen-record: false
speed-multiplier: 0.85                     # 15% piu' lento -> umano
debug: false
close-apps: false
kill-atx-agent: false
restart-atx-agent: true
disable-block-detection: false
disable-filters: false
dont-type: true                         # digitazione visibile nella searchbar (FastInputIME); piu' affidabile sugli hashtag rispetto al PASTE
total-crashes-limit: 3
count-app-crashes: false
shuffle-jobs: true                         # randomizza ordine likers/posts ogni sessione -> meno pattern
truncate-sources: 6-8                      # 6-8 hashtag/sessione per pool (3 pool attivi: likers-recent, likers-top, posts-recent)
scroll-skip-start: 35-120
resume-from-last-position: true
resume-anchor-search-limit: 30
resume-cooldown-days: 1
hot-zone-screens: 2
hot-zone-jump-flings: 6
hot-zone-max-jumps: 3

# Action burst guard
action-throttle-enabled: true
action-throttle-follow-min: 20-50          # ~50-90s tra 2 follow -> max ~70/h
action-throttle-like-min: 6-15             # ~6-15s tra 2 like  -> max ~300/h
action-throttle-comment-min: 240-360       # 4-6 min tra 2 commenti -> max ~12/h
action-throttle-pm-min: 999999             # DM OFF
action-throttle-unfollow-min: 20-45

# ---------------------------------------------------------------------------
# Actions - SOLO HASHTAG
# ---------------------------------------------------------------------------
# IMPORTANTE: hashtag-likers-recent + hashtag-posts-recent sono i due job
# attivi. Niente blogger-followers (gestito da config.yml separato).
#
# Pool hashtag 100% bodybuilding agonistico IT - federazioni e nicchie gare:
#   likers-recent: utenti attivi che mettono like -> lead "tiepidi" alto volume
#   likers-top:    utenti che likano i TOP post del tag -> lead piu' selezionati
#   posts-recent:  autori di post recenti -> creator/atleti -> commento AI peer-to-peer
# ---------------------------------------------------------------------------

# LIKERS dei post RECENTI -> bacino attivo, ruota 6-8 tag/sessione
hashtag-likers-recent: [garebodybuilding, bodybuildinggara, preparazioneagonistica, agonisticbodybuilding, bodybuildingcompetition, classicphysiqueitalia, classicphysique, menphysiqueitalia, menphysique, bikinigenerationitalia, bikinicategoryitalia, atletabodybuilding, preparatoreagonistico, coachbodybuilding, bodybuildingcoach, naturalbodybuildingitalia, naturalbodybuilding, colosseumifbb, bbfitalia, nbfitalia]

# LIKERS dei post TOP -> audience piu' selezionata e ad alto engagement
hashtag-likers-top: [garebodybuilding, preparazioneagonistica, classicphysiqueitalia, coachbodybuilding, preparatoreagonistico, bodybuildingitalia, naturalbodybuildingitalia, colosseumifbb, bbfitalia, nbfitalia, fifitalia, wbfitalia, fitmodelitalia, bodybuildinglife, classicbodybuilding, openbodybuildingitalia, bodybuildingcompetition, atletagonistico, coachagonistico, preparazionebodybuilding]

# AUTORI di post recenti -> creator/atleti agonisti, ideali per commento AI contestuale
hashtag-posts-recent: [garebodybuilding, classicphysiqueitalia, classicphysique, preparazioneagonistica, naturalbodybuildingitalia, bodybuildingitalia, colosseumifbb, bbfitalia, nbfitalia, preparatoreagonistico, coachbodybuilding, menphysiqueitalia, atletabodybuilding, preparazionebodybuilding, bodybuildingcompetition]

# BLOGGER FOLLOWERS -> followers di account coach/atleti di nicchia, audience pre-filtrata
blogger-followers: [francesca_coach_pro, fitspo.fla, antony_tony_nocerino, dalextraining_coach, coach_ginnytyro, bodybuilding_italia_community, wbpf_italy]

## Watching content (umanizza)
watch-video-time: 8-25
watch-photo-time: 2-5
delete-interacted-users: false

## Unfollow OFF su questa config (gestito da config-unfollow.yml)
sort-followers-newest-to-oldest: true
unfollow-delay: 30
delete-removed-followers: false

## Telegram reports OFF
telegram-reports: false

# ---------------------------------------------------------------------------
# Per-source limits (per singolo hashtag)
# ---------------------------------------------------------------------------
interactions-count: 18-25                  # 18-25 profili visitati/hashtag (l'hashtag-likers ha bacino piu' limitato per natura)
likes-count: 2                             # 2 like/profilo (post + 1 carousel slide)
likes-percentage: 85-95
carousel-count: 1-2
carousel-percentage: 50-70
max-comments-pro-user: 1
comment-percentage: 35-45                  # ~35-45% interagiti riceve commento AI -> ~6-9/sessione
pm-percentage: 0
interact-percentage: 70-85
follow-percentage: 60-75                   # ~65% di chi interagisce -> ~10-15 follow/hashtag, capped sotto a 6-8
follow-limit: 6-8                          # cap per-source: distribuisce su piu' hashtag invece di svuotarne uno
skipped-list-limit: 30-45
skipped-posts-limit: 4
fling-when-skipped: 0
min-following: 50

# ---------------------------------------------------------------------------
# Total Limits Per Session - 5 micro-sessioni/giorno (fasce gen. da run-dynamic.py)
# Totali giornalieri target:
#   follow:   5 x 10 = 50/g     (margine sotto cap 60-70)              ✅
#   like:     5 x 22 = 110/g    (margine sotto cap 120-150)            ✅
#   comment:  5 x  6 = 30/g     (margine ampio sotto cap 100)          ✅
# Rate sessione (~90 min):
#   follow:  ~7/h    (max prudente: 8-10/h)                            ✅
#   like:    ~14/h   (max prudente: 15-20/h)                           ✅
#   comment: ~4/h    (max prudente: 10-15/h)                           ✅
# ---------------------------------------------------------------------------
total-likes-limit: 20-25
total-follows-limit: 9-12
total-unfollows-limit: 999                 # cosmetic
total-watches-limit: 999                   # cosmetic
total-successful-interactions-limit: 9-12
total-interactions-limit: 999              # cosmetic
total-comments-limit: 5-7
total-pm-limit: 999                        # cosmetic
total-scraped-limit: 200-300

# ---------------------------------------------------------------------------
# Daily Budget (PERSISTENTE across riavvii)
# ATTENZIONE: questi cap sono CONDIVISI con config.yml via daily_budget.json.
# Devono essere identici (o piu' alti) tra le due config, altrimenti la
# config con cap piu' bassi termina subito le sessioni se l'altra config ha
# gia' consumato il budget di oggi.
# Valori allineati a config.yml: 70 follow / 150 like / 100 comment / 70 unf.
# ---------------------------------------------------------------------------
daily-follows-cap: 70                      # tetto/giorno (allineato a config.yml)
daily-likes-cap: 150                       # tetto/giorno (allineato a config.yml)
daily-unfollows-cap: 70
daily-comments-cap: 100                    # allineato a config.yml (AI -> qualita')
daily-pm-cap: 0

# ---------------------------------------------------------------------------
# AI Comments (Google Gemini) - PILASTRO DI QUESTA CONFIG
# I commenti AI contestuali sono la differenza maggiore tra "bot generico" e
# "interazione umana credibile". Gemini legge la caption del post e genera 1
# frase coerente in italiano, mai salesy. Fallback su comments_list.txt se
# qualcosa fallisce.
# ---------------------------------------------------------------------------
ai-comments-enabled: true
ai-comments-model: gemini-2.5-flash-lite
ai-comments-language: Italian
ai-comments-prompt-hint: "Italian fitness/bodybuilding audience. Author is Mattia, competitive classic physique bodybuilding athlete based in Turin (Torino, Piemonte, Italy). He trains seriously, follows a structured prep, and is passionate about gym culture, hypertrophy, posing, and contest prep. Tone: technical when relevant (mention specific muscles, exercises, periodization, symmetry, conditioning), peer-to-peer between fellow athletes, casual Italian register, genuine and direct. NEVER salesy, NEVER mention coaching/services/DM/link. NEVER use emoji, hashtags or exclamation marks. Reference something specific from the caption or visible context (exercise, physique detail, competition, nutrition). 1 short sentence max, sound like a fellow competitive athlete."
ai-comments-fallback-to-file: true

## Stories OFF
stories-count: 0
stories-percentage: 0

# ---------------------------------------------------------------------------
# Ending Session Conditions
# ---------------------------------------------------------------------------
end-if-likes-limit-reached: false
end-if-follows-limit-reached: true         # ferma quando follow al cap
end-if-watches-limit-reached: false
end-if-comments-limit-reached: false
end-if-pm-limit-reached: false

# ---------------------------------------------------------------------------
# Scheduling - 5 micro-sessioni/giorno generate da run-dynamic.py
# Le working-hours qui sotto sono SOLO un placeholder: vengono riscritte ad
# ogni lancio di run-dynamic.py in base all'orario corrente (5 sessioni
# distribuite tra l'orario di avvio e fine giornata). Non modificare a mano.
# ---------------------------------------------------------------------------
working-hours: [17.58-19.28, 19.40-21.10, 21.23-22.53, 23.03-00.33, 00.50-02.20]   # generata dinamicamente da run-dynamic.py
time-delta: 0-1                          # randomizza partenza
repeat: 1-5                              # gap minimo tra fine sessione e ricalcolo
total-sessions: -1                       # loop infinito (rispetta working-hours)

