##############################################################################
# Config STEALTH "Coach Fitness Fiorano" - allineato a tabelle anti-ban 2026.
# Profilo: personal trainer / coach online + palestra Fiorano Modenese.
# Obiettivo: crescere bacino targetizzato (fitness IT). DM disabilitati su
# questo branch (main): solo follow + like + commenti AI.
#
# Target giornaliero:
#   follow:   60-70    | like: 120-150 | commenti: 60-90 (AI Gemini) | DM: 0
# Rate orario garantito:
#   follow:  <= 8-10/h | like: <= 15-20/h | commenti: <= 10-15/h
# Strategia: 5 micro-sessioni brevi in fasce umane, niente raffiche.
##############################################################################

# ---------------------------------------------------------------------------
# General Configuration
# ---------------------------------------------------------------------------
username: marramattia_fmgpro
device: emulator-5554                      # ADB device serial (adb devices -l)
app-id: com.instagram.android
use-cloned-app: false
allow-untested-ig-version: true
screen-sleep: true                         # standby tra sessioni
screen-record: false
speed-multiplier: 0.85                     # rallenta del 15% -> piu' umano
debug: false
close-apps: false
kill-atx-agent: false
restart-atx-agent: true                    # se l'agent uiautomator si rompe a meta sessione, ricrealo (anti-cieco: senza, il bot continua a digitare ma non vede l'UI di IG -> 0 azioni)
disable-block-detection: false             # IMPORTANTE: rileva action-block
disable-filters: false
dont-type: true
total-crashes-limit: 3
count-app-crashes: false
shuffle-jobs: false                        # ordine fisso: blogger-followers prima, poi hashtag-likers-recent e hashtag-likers-top
truncate-sources: 10-12                    # [yield-tune] piu' sorgenti per sessione: riduce il peso delle hot-zone gia' viste e aumenta il bacino fresco
scroll-skip-start: 35-120                  # [yield-tune] quando manca anchor, salta piu' in profondita' per evitare utenti gia' processati in alto
resume-from-last-position: true            # ricorda l'ULTIMO utente analizzato per ogni sorgente e riprende da li' la sessione dopo
resume-anchor-search-limit: 30             # [yield-tune] limita tempo perso in ricerca anchor lunga; fallback random prima
resume-cooldown-days: 5                    # [yield-tune v2] da 3gg a 5gg: log mostra che le sorgenti top vengono ri-visitate troppo presto e producono "Same users iterated 5 times" + 0 fresh. Dare piu' respiro alla lista.
hot-zone-screens: 2                        # [yield-tune] reagisci prima alle schermate senza utenti freschi
hot-zone-jump-flings: 6                    # [yield-tune] salto piu' profondo per uscire dalle zone gia' battute
hot-zone-max-jumps: 2                      # [yield-tune v2] da 3 a 2: log mostra 20+ "hot-zone detected" ma 0 "Abandoning source" -> il bot resta intrappolato a fling-e-trovare-1-utente. Meglio chiudere prima e cambiare sorgente.

# Action burst guard - vieta a IG di vedere mai 2 follow in 5s o 2 like in 2s
action-throttle-enabled: true
action-throttle-follow-min: 25-60          # min secondi fra 2 follow consecutivi (max ~90/h, target ~60/h)
action-throttle-like-min: 8-20             # min secondi fra 2 like consecutivi (max ~270/h, target ~150/h)
action-throttle-unfollow-min: 20-45
action-throttle-comment-min: 240-360       # 4-6 min tra 2 commenti consecutivi -> max ~10-15 comment/h (tetto tabella anti-ban: 15/h)
action-throttle-pm-min: 300-540            # 5-9 min tra 2 DM -> max ~7-8 DM/h (tabella anti-ban DM: <=10/h, sto sotto)

# ---------------------------------------------------------------------------
# Actions
# ---------------------------------------------------------------------------
