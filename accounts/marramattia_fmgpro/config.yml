blogger-followers: [carlo_ceglia_, alberto_gaz_gazzera, gretanicoletti_pt, manu3lito_bb, ivano.vitagliano.coach, marco.casadei_, afmi2_segrate, malatidipalestraofficial, ifbbproitaly, npc_italy, pieronocerino1, vitastrong_ita, giusepperomanocoach, ludovico.lemme, marcogrizz_photo, filipposoa, sara.evangelista, bodynutrition_tarquinia, space.gym.official, asteroidi_official, davide.fanelli1, punzetti_sara_ifbbpro, anna.ladurner.ifbbpro, alex_ifbb_pro, manuel_santalucia_ifbbpro, giusi.cesarini, edwin_underwood, alex__zuccaro, wabbaitalia, fit.italia, emilio.dalessandro.92, _.paolalochi._, ricette_ghisa, cristian_ciampani92_, simonegenerali, ornella_angileri_ifbbpro, dario_beloli_ifbbpro, fabbian.lorenz, leonardopratoo, cbuzz93, samuellfortuna, sayan.nickk, omarnonni_pnbapro, riccardo_cavallini, greta.adamii_fit, niccolo.balboni.coaching, massimo_personal_trainer, dario.pnbapro.coach, agostomauro_pcaitaly, gerard_ifbb_, bodybuilding_italia_community_, federico_mariani_, ste_cossu96, francesco_arcidiacono90, annatfit.pt, danielacamboni, lucacirillo_personaltrainer, paolozoncatrainer, fede_castell_, thenewclassic_s, kellysxv94, marcokoduzi, tm_nutrizione, jack_fogli, tieeco, japan_skin, eulyfitnesstudio, erica_fede94, simonearmaroli, ross_sun_, wnbfitaly, kristianluino_trainer, emanuele_doc_fitness, marcovalentina_bodybuilding, matteo_classic_physique, federico_gare_bodybuilding, nicola_preparatore_agosta, stefano_natural_bb, riccardo_classic_italia, fabio_preparazione_agonistica, luca_bodybuilding_pt, marco_ifbb_coach, davide_gare_bb, alex_preparatorio_italia, giorgio_bodybuilding_natural, silvio_ifbb_prep, coach_ginnytyro, bodybuilding_italia_community, wbpf_italy, olgs_fitness, riccardo.oliver_, nardin_nicole, chiara_pugliesi, train.with.vish, carawolder, gianxfit, pugliese.fitness, andrea.presti_ifbbpro, flavio.ercoli, rickytorrestrainer, eloisostuni, martaacap, magnammsemp, catycastronpc, zahirkhudayarov, vecchi_mattia, zagarella_ifbb_pro]
# Hashtag a tema fitness IT: pesca utenti che hanno MESSO LIKE ai post recenti
# di questi hashtag. Lead piu' caldi dei semplici follower (interesse esplicito).
# Tabella anti-ban 2026: hashtag-job e' meno rischioso del blogger-followers
# perche' non scrolla "lista follower" ma "lista likers di un post" (UX simile
# all'utente che apre un post da Esplora). Limite naturale dei post recenti:
# se un hashtag ha 500 like, il bot ne pesca al max ~25-30 prima di dichiarare
# esaurimento e passare al prossimo.
# Hashtag generali fitness IT + nicchia locale Emilia + bodybuilding/coaching specifici
hashtag-likers-recent: [garebodybuilding, bodybuildinggara, preparazioneagonistica, agonisticbodybuilding, classicphysiqueitalia, menphysiqueitalia, atletabodybuilding, preparatoreagonistico, coachbodybuilding, bodybuildingcoach, naturalbodybuildingitalia, palestraitalia, classicoitaliano, colosseumifbb, bbfitalia, nbfitalia, fifitalia, fitmodelitalia, dedizionebodybuilding, bodybuildinglife, fitnesslifestyleitalia, muscolazione, pesistica, determinatione, passionepalestra, workoutitalia, bodybuildingtraining, ipertrofia, massamuscolare, nopainnogain]
hashtag-likers-top: [garebodybuilding, preparazioneagonistica, classicphysiqueitalia, coachbodybuilding, preparatoreagonistico, bodybuildingitalia, naturalbodybuildingitalia, colosseumifbb, bbfitalia]
## Watching content (umanizza)
watch-video-time: 8-25
watch-photo-time: 2-5
delete-interacted-users: false             # tieni storico

## Unfollow OFF in fase di crescita (le tabelle dicono: meglio separare unfollow dai follow,
## farli in sessioni dedicate, in giorni diversi). Riattiva quando sei intorno a 7000+ following.
sort-followers-newest-to-oldest: true
unfollow-delay: 30

## Remove followers OFF
delete-removed-followers: false

## Telegram reports OFF
telegram-reports: false

# ---------------------------------------------------------------------------
# Source Limits (per singolo blogger, dentro una sessione)
# ---------------------------------------------------------------------------
interactions-count: 35-50                  # [yield-tune+] alzato 20-30 -> 35-50: con sorgenti gia' battute (50% utenti = "already interacted, skip"), servono piu' tentativi per estrarre 5-9 follow utili. Il vero freno resta total-successful-interactions-limit (sessione).
likes-count: 2                             # 2 like per profilo (ridotto: meno chance di beccare Reel buggati)
likes-percentage: 85-95                    # quasi sempre likka, mai 100% (anti-pattern)
carousel-count: 1-2
carousel-percentage: 30-50                 # [v2] abbassato da 50-70 a 30-50: log mostra 25-67 "Fail to like post"/giorno (178 totali in 4gg), causa probabile = doppio-tap su carosello che cambia slide invece di likare. Meno caroselli = meno fail.
max-comments-pro-user: 1                   # max 1 commento per utente (anti-ban: mai 2 sullo stesso post)
comment-percentage: 55-70                  # [PUSH] ~55-70% degli utenti interagiti riceve un commento -> ~12-15/sessione su 15-22 utenti veri. Il throttler limita comunque a max 15/h.
pm-percentage: 0                           # [DISABILITATO] DM completamente off su main (i DM sono gestiti solo nel branch personalcoaching tramite il plugin custom dm-followback)
interact-percentage: 70-85
follow-percentage: 50-65                   # ~55% di chi interagisce -> ~7-9 follow/sorgente
follow-limit: 10-15                        # [soft-floor] alzato da 8-12: cosi' il cap per-sorgente non diventa il bottleneck quando una sorgente e' "calda" e la sessione e' ancora sotto il target follow
skipped-list-limit: 50-70                  # [bumped] 50-70 (era 30-45): meno chiusure premature di sorgente per "Same users iterated 2 times". Scrolla piu' a lungo nella zona "calda" prima di abbandonare.
skipped-posts-limit: 4
fling-when-skipped: 0
min-following: 50

# ---------------------------------------------------------------------------
# Total Limits Per Session - 5 sessioni/giorno (micro-sessioni)
# Totali giornalieri target:
#   follow:   5 x 13   = 65/g          (tabella: 60-70)              ✅
#   like:     5 x 27   = 135/g         (tabella: 120-150)            ✅
#   comment:  5 x 13   = 65-75/g       (tabella: 150-200, half-tank) ✅
# Rate orario sessione (~90 min):
#   follow:  ~8-9 follow/h             (max prudente: 8-10/h)        ✅
#   like:    ~18 like/h                (max prudente: 15-20/h)       ✅
#   comment: ~10-13 comment/h          (tabella: 10-15/h, al limite) ✅
# ---------------------------------------------------------------------------
total-likes-limit: 24-30                   # 24-30 like/sessione
total-follows-limit: 11-15                 # 11-15 follow/sessione
total-unfollows-limit: 999                 # [cosmetic] 0-0 produceva "Limit Reached" nei log; 999 = il bot non unfollowera' mai perche' non c'e' un job action-unfollow attivo. Solo cosmetica.
total-watches-limit: 999                   # [cosmetic] 0-0 produceva "Limit Reached" nei log; 999 = stories OFF garantito da stories-count: 0 + stories-percentage: 0 sotto. Solo cosmetica.
total-successful-interactions-limit: 11-15
total-interactions-limit: 999              # IRRILEVANTE: questo conta solo i profili VISITATI (anche skippati). Il vero limite anti-ban e' total-successful-interactions-limit.
total-comments-limit: 12-15                # [PUSH] 12-15 commenti/sessione (~10-13/h, al tetto della tabella anti-ban 10-15/h). Il throttle 240-360s impedisce burst sopra 15/h.
total-pm-limit: 999                        # [cosmetic] 0-0 produceva "Limit Reached" nei log; DM gestiti solo dal branch personalcoaching, qui non partiranno mai (pm-percentage: 0). Solo cosmetica.
total-scraped-limit: 200-300               # ALTO: NON deve mai scattare. 0-0 farebbe finire subito la sessione (bug GA: scraped fa parte della condizione di stop)

# ---------------------------------------------------------------------------
# Daily Budget (PERSISTENTE across riavvii del bot)
# I limiti "total-*-limit" sopra sono per-sessione e si azzerano ad ogni avvio.
# Se chiudi il PC e riapri, GramAddict NON sa quante azioni hai gia' fatto oggi
# -> rischio di superare i tetti anti-ban. Questi cap sono salvati su disco
# (accounts/<user>/daily_budget.json) e clippano automaticamente i limiti di
# ogni nuova sessione a quanto rimane del cap giornaliero.
# Reset automatico a mezzanotte (calendario locale).
# ---------------------------------------------------------------------------
daily-follows-cap: 70                      # tetto follow/giorno (tabella prudente: 60-70)
daily-likes-cap: 150                       # tetto like/giorno   (tabella prudente: 120-150)
daily-unfollows-cap: 100                   # tetto unfollow/giorno alzato a 100
daily-comments-cap: 100                    # [PUSH] max 100 commenti/giorno (tabella: 150-200/g; sto al ~50% del tetto, margine x retry/imprevisti)
daily-pm-cap: 0                            # OFF su main (DM disabilitati, vedi total-pm-limit)

# ---------------------------------------------------------------------------
# AI Comments (Google Gemini) - DISABILITATO di default
# Quando abilitato, prima di pescare un commento dal file txt il bot prova a
# generarne uno via Gemini API basandosi sulla caption del post (estratta via
# UI). On any error (no key, rete, rate-limit, safety block, output con
# emoji/hashtag/!) cade automaticamente su comments_list.txt -> zero rischio
# di crash o di postare commenti tipo-bot.
#
# Per attivare:
#   1. ottieni una API key gratuita da https://aistudio.google.com/app/apikey
#   2. esporta GEMINI_API_KEY=AIzaSy... nel tuo shell, OPPURE metti la key
#      direttamente sotto ai-comments-api-key (ATTENZIONE: non committare!)
#   3. setta ai-comments-enabled: true
#   4. alza max-comments-pro-user e total-comments-limit (sono a 0 ora)
#
# NB: i commenti restano comunque uno strumento ad ALTO rischio anti-spam.
# Tabelle anti-ban 2026: max 5-10 commenti/giorno, mai >2 nello stesso post,
# pause >60s tra due commenti consecutivi (gia' enforce-ato dal throttler).
# ---------------------------------------------------------------------------
ai-comments-enabled: true                  # ATTIVO: usa Gemini per generare commenti context-aware
# ai-comments-api-key: "AIzaSy..."         # NON mettere qui: usa env GEMINI_API_KEY (caricata da .env.local via run-dynamic.py / run-bot.sh)
ai-comments-model: gemini-2.5-flash-lite   # PRIMARIO: economico e veloce. Se fallisce (rate-limit/5xx/safety) il bot prova in cascata 2.5-flash, 1.5-flash-8b, 1.5-flash.
# ai-comments-models: "gemini-2.5-flash-lite,gemini-2.5-flash,gemini-1.5-flash-8b"  # OPZIONALE: catena custom (overrides il default cascade)
ai-comments-language: Italian              # lingua dei commenti generati
ai-comments-prompt-hint: "Italian fitness/bodybuilding audience. Author is Mattia, competitive classic physique bodybuilding athlete based in Turin (Torino, Piemonte, Italy). He trains seriously, follows a structured prep, and is passionate about gym culture, hypertrophy, posing, and contest prep. Tone: technical when relevant (mention specific muscles, exercises, periodization, symmetry, conditioning), peer-to-peer between fellow athletes, casual Italian register, genuine and direct. NEVER salesy, NEVER mention coaching/services/DM/link. NEVER use emoji, hashtags or exclamation marks. Reference something specific from the caption or visible context (exercise, physique detail, competition, nutrition). 1 short sentence max, sound like a fellow competitive athlete."
ai-comments-fallback-to-file: true         # on AI failure, fallback a comments_list.txt (consigliato)


## Stories OFF
stories-count: 0
stories-percentage: 0

# ---------------------------------------------------------------------------
# Ending Session Conditions
# ---------------------------------------------------------------------------
end-if-likes-limit-reached: false          # [v2] NON chiudere la sessione se solo i like sono al cap. Cosi' il bot continua a usare follow/commenti residui invece di aprire sessioni "fantasma" da 28s che terminano subito (vedi log 22:51-23:31 del 10/05). La fine sessione resta governata da end-if-follows-limit-reached: true.
end-if-follows-limit-reached: true         # CRITICO: ferma quando arrivi al cap follow
end-if-watches-limit-reached: false
end-if-comments-limit-reached: false
end-if-pm-limit-reached: false

# ---------------------------------------------------------------------------
# Scheduling - 5 micro-sessioni distribuite su tutta la giornata
# Mai sessioni notturne (00-08), pause minime di 90 min tra una sessione e l'altra,
# attivita' concentrate nelle ore di reale uso umano di IG.
# ---------------------------------------------------------------------------
working-hours: [14.31-16.01, 17.22-18.52, 20.16-21.46, 22.54-00.24, 01.29-02.59]   # generata dinamicamente da run-dynamic.py
time-delta: 0-1                          # randomizza partenza di 5-25 min
repeat: 1-5                                # [Opzione A] pausa minimale (1-5 min) tra fine sessione e ricalcolo working-hours: cosi' il vero gap tra le sessioni e' SEMPRE governato da working-hours (run-dynamic.py), non si somma a 60-120 min extra che facevano slittare le sessioni di ore.
total-sessions: -1                         # loop infinito (rispetta working-hours)
