##############################################################################
# For more information on parameters, refer to: 
# https://docs.gramaddict.org/#/configuration?id=configuration-file
#
# Note: be sure to comment out any parameters not used by adding a # in front
# AGAIN: YOU DON'T HAVE TO DELETE THE LINE, BUT ONLY COMMENT IT WITH A #!
##############################################################################
# General Configuration
##############################################################################

username: marramattia_fmgpro # you have to put your IG name here!
# device: put_your_device_id_there # 'adb devices' in the console to know it.  It's needed only if you have more than 1 device connected
app-id: com.instagram.android
use-cloned-app: false
allow-untested-ig-version: false # Using an untested version of IG would cause unexpected behavior because some elements in the user interface may have been changed
screen-sleep: true
screen-record: false
speed-multiplier: 1
debug: false
close-apps: false
kill-atx-agent: false
restart-atx-agent: false
disable-block-detection: false
disable-filters: false
dont-type: false
# scrape-to-file: scraped.txt
total-crashes-limit: 5
count-app-crashes: false
shuffle-jobs: true
truncate-sources: 2-5
# scroll-skip-start: 10-30 # skip a random N of items at the top of each source list (followers/likers/posts) so the bot doesn't always analyze the same users
# resume-from-last-position: true # remember the last user analyzed per source and on the next run scroll until the anchor is found, then resume
# resume-anchor-search-limit: 50 # max scrolls used to look for the saved anchor before falling back to scroll-skip-start
# resume-cooldown-days: 14 # wait N days before re-exploring a source list once it has been fully exhausted
# hot-zone-screens: 3 # [hot-zone] consecutive screens with 0 fresh users that trigger a deep-jump (fling) to escape an already-explored segment. 0 disables.
# hot-zone-jump-flings: 4 # [hot-zone] number of consecutive flings per jump (~30-50 users skipped per fling)
# hot-zone-max-jumps: 2 # [hot-zone] max jump attempts on the same source before abandoning it for the next one

# Warm follow: only follow (public, non-empty) users you actually engaged with this interaction
# (likes + comments + watched stories + PM). Converts to a follow-back much better than a cold follow.
# follow-only-if-engaged: true
# follow-min-engagement: 1 # min engagement actions required to follow (number or range, e.g. 1-2)

# Auto follow-back-rate: scrape your own followers once per session and recompute the per-source
# follow-back-rate, so source selection automatically favors sources that actually follow you back.
# auto-fbr-refresh: true
# auto-fbr-interval-hours: 24 # min hours between two refreshes (number or range, e.g. 20-28)
# auto-fbr-max-scan: 0 # safety cap on followers scanned. 0 = full scan (recommended). If hit before list end, recompute is skipped to avoid a deflated FBR.
# auto-fbr-full-rescan-days: 7 # ogni quanti giorni fare un FULL scan; tra un full e l'altro lo scan e' INCREMENTALE (solo i nuovi follower in cima) -> secondi invece di minuti.

# Action burst guard: enforces a hard floor between consecutive actions of the
# same kind to avoid burst patterns that look automated. Recommended ON.
# action-throttle-enabled: true
# action-throttle-follow-min: 25-60   # min seconds between two consecutive follows
# action-throttle-like-min: 8-20      # min seconds between two consecutive likes
# action-throttle-unfollow-min: 20-45
# action-throttle-comment-min: 60-180
# action-throttle-pm-min: 120-300

##############################################################################
# Actions
##############################################################################

## Interaction (active jobs)
blogger-followers: [ username1, username2 ]
blogger-following: [ username1, username2 ]
blogger-post-likers: [ username1, username2 ]
blogger: [ username1, username2 ]
hashtag-likers-top: [ hashtag1, hashtag2 ]
hashtag-likers-recent: [ hashtag1, hashtag2 ]
hashtag-posts-top: [ hashtag1, hashtag2 ]
hashtag-posts-recent: [ hashtag1, hashtag2 ]
place-posts-top: [ place1, place2 ]
place-posts-recent: [ place1, place2 ]
place-likers-top: [ place1, place2 ]
place-likers-recent: [ place1, place2 ]
interact-from-file: [usernames1.txt 10-15, usernames2.txt 3]
posts-from-file: posts.txt
feed: 2-5 # is the number of likes you will give in feed

## Special modifier for jobs and sources
watch-video-time: 15-35
watch-photo-time: 3-4
# can-reinteract-after: 48 # the amount of hours that have to pass from the last interaction
delete-interacted-users: true

## Unfollow (unfollow jobs)
unfollow: 10-20
unfollow-any: 10-20
unfollow-non-followers: 10-20
unfollow-any-non-followers: 10-20
unfollow-any-followers: 10-20
unfollow-from-file: [usernames1.txt 7-15, usernames2.txt 6]

## Special modifier for unfollow jobs
sort-followers-newest-to-oldest: false
unfollow-delay: 15

## Remove followers (active jobs)
remove-followers-from-file: [remove1.txt 5-10, remove2.txt 6]

## Special modifier for remove followers
delete-removed-followers: true

## Post Processing
# analytics: false # no more supported
telegram-reports: false # for using telegram-reports you have also to configure telegram.yml in your account folder

## Special actions
# pre-script: pre_script_path_here
# post-script: post_script_path_here

##############################################################################
# Source Limits
##############################################################################

interactions-count: 30-40
likes-count: 1-2
likes-percentage: 100
stories-count: 1-2
stories-percentage: 30-40
carousel-count: 2-3
carousel-percentage: 60-70
max-comments-pro-user: 1-2
# comment-percentage: 30-40
# pm-percentage: 30-40
interact-percentage: 30-40
follow-percentage: 30-40
follow-limit: 50
skipped-list-limit: 10-15
skipped-posts-limit: 5
fling-when-skipped: 0
min-following: 100

##############################################################################
# Total Limits Per Session
##############################################################################

total-likes-limit: 120-150
total-follows-limit: 40-50
total-unfollows-limit: 40-50
total-watches-limit: 120-150
total-successful-interactions-limit: 120-150
total-interactions-limit: 280-300
total-comments-limit: 3-5
total-pm-limit: 3-5
total-scraped-limit: 100-150

##############################################################################
# Daily Budget (PERSISTENT across bot restarts)
# Per-session "total-*-limit" above are reset every time the bot starts.
# These caps live in accounts/<user>/daily_budget.json and clip session
# limits to what's left of the daily budget. Set to 0 to disable a cap.
##############################################################################

# daily-follows-cap: 70
# daily-likes-cap: 150
# daily-unfollows-cap: 70
# daily-comments-cap: 0
# daily-pm-cap: 0

##############################################################################
# AI Comments (Google Gemini) - OFF by default.
# When enabled, the bot tries to generate a context-aware comment with
# Gemini (using the post caption extracted from the IG UI). On ANY error
# (no key, network, rate-limit, safety block, banned chars in output) it
# falls back to comments_list.txt -> never crashes.
# Get a free API key at https://aistudio.google.com/app/apikey or set the
# env var GEMINI_API_KEY (preferred: avoids hard-coding secrets).
##############################################################################

# ai-comments-enabled: true
# ai-comments-api-key: "AIzaSy..."          # optional: fallback to env GEMINI_API_KEY / GOOGLE_AI_API_KEY
# ai-comments-model: gemini-2.5-flash-lite  # cheap & fast; bump to gemini-2.5-flash for higher quality
# ai-comments-language: English             # output language for generated comments
# ai-comments-prompt-hint: "supportive but not cheesy, casual register"
# ai-comments-fallback-to-file: true        # on AI failure, fall back to comments_list.txt

##############################################################################
# Ending Session Conditions
##############################################################################

end-if-likes-limit-reached: true
end-if-follows-limit-reached: false
end-if-watches-limit-reached: false
end-if-comments-limit-reached: false
end-if-pm-limit-reached: false

##############################################################################
# Scheduling
##############################################################################

working-hours: [10.15-16.40, 18.15-22.46]
time-delta: 10-15
repeat: 280-320
total-sessions: 1 # -1 or commented for infinite sessions
